<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>밀리언 라이브 퍼스널 컬러 퀴즈</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f5f7;
      --page-bg: #f4f5f7;
      --surface: #ffffff;
      --surface-glass: #ffffff;
      --surface-strong: #eceef3;
      --choice-bg: #e8ebf2;
      --choice-hover: #dfe5f0;
      --choice-ink: #4d5668;
      --selected-ink: #ffffff;
      --input-bg: #e9ebf0;
      --start-panel-bg: #ffffff;
      --start-panel-ink: #171821;
      --start-panel-muted: #6d7180;
      --ink: #171821;
      --muted: #6d7180;
      --line: transparent;
      --line-strong: transparent;
      --accent: #8db7ff;
      --accent-strong: #6f9ff2;
      --pink: #eb6d8d;
      --teal: #59c9c3;
      --gold: #e8b84e;
      --deep: #20212b;
      --selected-bg: #8db7ff;
      --input-border: rgba(23, 24, 33, 0.18);
      --input-inset: inset 0 2px 8px rgba(24, 27, 36, 0.08);
      --swatch-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
      --swatch-shadow-hover: 0 8px 18px rgba(0, 0, 0, 0.12);
      --shadow: 0 24px 56px rgba(25, 26, 35, 0.1);
      --soft-shadow: none;
      --radius: 16px;
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #111118;
      --page-bg: #111118;
      --surface: #1a1a24;
      --surface-glass: #1a1a24;
      --surface-strong: #232330;
      --choice-bg: #2a2a35;
      --choice-hover: #383846;
      --choice-ink: #c9cbd3;
      --selected-ink: #ffffff;
      --input-bg: #252532;
      --start-panel-bg: #1a1a24;
      --start-panel-ink: #f4f6fb;
      --start-panel-muted: #a4a8b6;
      --ink: #f4f6fb;
      --muted: #a4a8b6;
      --accent: #9bbfff;
      --accent-strong: #7ca8f7;
      --pink: #ff7d9c;
      --teal: #68d6cf;
      --gold: #f0c15d;
      --deep: #090910;
      --selected-bg: #8db7ff;
      --input-border: rgba(255, 255, 255, 0.16);
      --input-inset: inset 0 2px 8px rgba(0, 0, 0, 0.28);
      --swatch-shadow: 0 4px 10px rgba(0, 0, 0, 0.22);
      --swatch-shadow-hover: 0 8px 18px rgba(0, 0, 0, 0.28);
      --shadow: 0 26px 70px rgba(0, 0, 0, 0.34);
      --soft-shadow: 0 14px 34px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: Pretendard, "Noto Sans KR", Inter, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: var(--page-bg);
      transition: all 0.2s ease;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
    }

    .app {
      width: min(1120px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 40px 24px;
      display: grid;
      align-items: center;
    }

    .screen {
      display: none;
      width: 100%;
    }

    .screen.is-active {
      display: block;
    }

    .icon-sprite {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
    }

    .app-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .title-block {
      display: grid;
      gap: 8px;
    }

    .header-actions {
      display: flex;
      justify-content: end;
      align-items: center;
      min-width: 128px;
    }

    .theme-toggle {
      display: inline-grid;
      grid-template-columns: 24px 46px 24px;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 0;
      background: var(--surface);
      color: var(--ink);
      box-shadow: none;
      transition: all 0.2s ease;
    }

    .theme-toggle:hover {
      transform: translateY(-2px);
      background: var(--surface-strong);
    }

    .theme-icon {
      display: grid;
      place-items: center;
      font-size: 1.02rem;
      line-height: 1;
      opacity: 0.48;
      transition: all 0.2s ease;
    }

    .theme-toggle-track {
      position: relative;
      display: block;
      width: 46px;
      height: 24px;
      border-radius: 999px;
      background: var(--choice-bg);
    }

    .theme-toggle-thumb {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pink), var(--gold));
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.22);
      transition: all 0.2s ease;
    }

    html[data-theme="light"] .theme-icon-sun,
    html[data-theme="dark"] .theme-icon-moon {
      opacity: 1;
      color: var(--gold);
    }

    html[data-theme="dark"] .theme-toggle-thumb {
      transform: translateX(22px);
      background: linear-gradient(135deg, var(--teal), #8fc9ff);
    }

    .eyebrow {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 4.8rem);
      line-height: 1;
      letter-spacing: 0;
      font-weight: 900;
    }

    .subtitle {
      max-width: 640px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 1.02rem;
      font-weight: 600;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
      align-items: stretch;
    }

    .panel {
      min-width: 0;
      margin: 0;
      padding: 24px;
      border: 0;
      border-radius: var(--radius);
      background: var(--surface-glass);
      box-shadow: none;
      backdrop-filter: none;
    }

    legend,
    .panel-title {
      padding: 0;
      margin-bottom: 18px;
      color: var(--ink);
      font-size: 1rem;
      font-weight: 900;
    }

    .radio-stack,
    .difficulty-grid,
    .count-controls {
      display: grid;
      gap: 14px;
    }

    .choice-label {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 58px;
      padding: 16px 18px;
      border: 0;
      border-radius: var(--radius);
      background: var(--choice-bg);
      color: var(--choice-ink);
      transition: all 0.2s ease;
    }

    .choice-label:hover {
      transform: translateY(-2px);
      background: var(--choice-hover);
      box-shadow: none;
    }

    .choice-label:has(input:checked) {
      border: 0;
      background: var(--selected-bg);
      color: var(--selected-ink);
      box-shadow: none;
    }

    .choice-label input {
      display: none;
    }

    .choice-label strong {
      font-size: 1rem;
      font-weight: 850;
    }

    .choice-label span {
      color: currentColor;
      font-size: 0.9rem;
      font-weight: 800;
      opacity: 0.72;
    }

    .group-choice-main {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .group-icons {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex: 0 0 auto;
    }

    .group-icon {
      display: block;
      width: 28px;
      height: 22px;
      fill: currentColor;
    }

    .group-icon.allstars {
      color: #f34e6c;
    }

    .group-icon.millionstars {
      color: #ffc20b;
    }

    .difficulty-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .difficulty-grid .choice-label {
      justify-content: center;
      min-height: 68px;
      padding: 18px 14px;
    }

    .difficulty-grid .choice-label strong {
      font-size: 1.04rem;
    }

    .count-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .count-preset,
    .ghost-button,
    .primary-button {
      min-height: 54px;
      border-radius: var(--radius);
      border: 0;
      background: var(--choice-bg);
      color: var(--choice-ink);
      font-weight: 850;
      transition: all 0.2s ease;
    }

    .count-preset:hover,
    .ghost-button:hover,
    .primary-button:hover {
      transform: translateY(-2px);
      background: var(--choice-hover);
      box-shadow: none;
    }

    .count-preset.is-selected {
      color: #fff;
      background: var(--selected-bg);
    }

    .number-field {
      display: grid;
      gap: 10px;
    }

    .number-field label {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 800;
    }

    .number-field input {
      width: 100%;
      min-height: 56px;
      padding: 14px 16px;
      border: 1px solid var(--input-border);
      border-radius: var(--radius);
      background: var(--input-bg);
      color: var(--ink);
      font-size: 1.02rem;
      font-weight: 850;
      outline: 0;
      box-shadow: var(--input-inset);
      transition: all 0.2s ease;
    }

    .number-field input:focus {
      background: var(--surface-strong);
      border-color: var(--accent);
      box-shadow: var(--input-inset), 0 0 0 4px rgba(141, 183, 255, 0.18);
    }

    .start-actions {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-top: 22px;
      padding: 22px 24px;
      border-radius: var(--radius);
      background: var(--start-panel-bg);
      color: var(--start-panel-ink);
      box-shadow: none;
    }

    .pool-summary {
      display: grid;
      gap: 4px;
    }

    .pool-summary strong {
      font-size: 1.1rem;
    }

    .pool-summary span {
      color: var(--start-panel-muted);
      font-size: 0.9rem;
    }

    .primary-button {
      min-width: 170px;
      border: 0;
      background: var(--selected-bg);
      color: #fff;
      font-weight: 900;
      box-shadow: none;
    }

    .primary-button:hover {
      background: var(--accent-strong);
    }

    .primary-button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
      box-shadow: none;
    }

    .quiz-shell {
      position: relative;
      display: grid;
      gap: 18px;
      padding-top: 56px;
    }

    .quiz-nav {
      position: fixed;
      top: max(14px, env(safe-area-inset-top));
      left: max(14px, env(safe-area-inset-left));
      z-index: 20;
      pointer-events: none;
    }

    .back-button {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      border: 0;
      background: var(--surface);
      color: var(--ink);
      font-size: 0.92rem;
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.1);
      pointer-events: auto;
      transition: all 0.2s ease;
    }

    .back-button:hover {
      transform: translateY(-2px);
      background: var(--surface-strong);
    }

    .secondary-button,
    .next-button {
      min-height: 46px;
      padding: 0 18px;
      border-radius: 14px;
      border: 0;
      background: var(--surface-strong);
      color: var(--ink);
      font-weight: 900;
      transition: all 0.2s ease;
    }

    .secondary-button:hover,
    .next-button:hover {
      transform: translateY(-2px);
      background: var(--choice-hover);
    }

    .next-button {
      min-width: 180px;
      min-height: 54px;
      background: var(--selected-bg);
      color: var(--selected-ink);
      font-weight: 900;
    }

    .next-button:hover {
      background: var(--accent-strong);
    }

    .next-button[hidden] {
      display: none;
    }

    .quiz-progress {
      display: grid;
      gap: 12px;
    }

    .quiz-top {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      align-items: center;
    }

    .stat {
      display: grid;
      gap: 4px;
      min-height: 72px;
      padding: 14px 16px;
      border: 0;
      border-radius: var(--radius);
      background: var(--surface-glass);
      box-shadow: none;
      backdrop-filter: none;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .stat strong {
      font-size: 1.28rem;
    }

    .progress-track {
      position: relative;
      width: 100%;
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--surface-strong);
    }

    .progress-bar {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--pink), var(--teal), var(--gold));
      transform: scaleX(0);
      transform-origin: left center;
      transition: transform 0.35s ease;
    }

    .stage {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 22px;
      justify-items: center;
      padding: 28px;
      border: 0;
      border-radius: var(--radius);
      background: var(--surface-glass);
      box-shadow: var(--shadow);
      backdrop-filter: none;
    }

    .image-frame {
      position: relative;
      width: min(420px, 100%);
      aspect-ratio: 4 / 5;
      overflow: hidden;
      border-radius: 20px;
      border: 0;
      background: var(--surface-strong);
      box-shadow: none;
    }

    .image-frame img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-frame.is-missing img {
      display: none;
    }

    .image-fallback {
      display: none;
      width: 100%;
      height: 100%;
      place-items: center;
      padding: 24px;
      text-align: center;
      color: #fff;
    }

    .image-frame.is-missing .image-fallback {
      display: grid;
    }

    .fallback-name {
      font-size: clamp(1.8rem, 8vw, 3.8rem);
      font-weight: 900;
      line-height: 1.08;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.22);
      word-break: keep-all;
    }

    .caption {
      display: grid;
      gap: 4px;
      text-align: center;
    }

    .caption strong {
      font-size: clamp(1.25rem, 4vw, 2rem);
    }

    .caption span {
      color: var(--muted);
      font-weight: 700;
    }

    .swatches {
      --swatch-size: clamp(50px, 7vw, 74px);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: clamp(10px, 2vw, 18px);
      width: min(720px, 100%);
      min-height: calc(var(--swatch-size) + 12px);
    }

    .color-choice {
      flex: 0 0 var(--swatch-size);
      width: var(--swatch-size);
      height: var(--swatch-size);
      min-width: var(--swatch-size);
      min-height: var(--swatch-size);
      max-width: var(--swatch-size);
      max-height: var(--swatch-size);
      aspect-ratio: 1 / 1;
      padding: 0;
      border: 0;
      border-radius: 9999px;
      box-shadow: var(--swatch-shadow);
      transition: all 0.2s ease;
    }

    .color-choice:hover {
      transform: translateY(-4px) scale(1.04);
      box-shadow: var(--swatch-shadow-hover);
    }

    .color-choice:disabled {
      cursor: default;
    }

    .color-choice:disabled:hover {
      transform: none;
      box-shadow: var(--swatch-shadow);
    }

    .color-choice:focus-visible,
    .theme-toggle:focus-visible,
    .ghost-button:focus-visible,
    .primary-button:focus-visible,
    .save-button:focus-visible,
    .secondary-button:focus-visible,
    .back-button:focus-visible,
    .next-button:focus-visible,
    .count-preset:focus-visible,
    .choice-label input:focus-visible,
    .number-field input:focus-visible {
      outline: 3px solid rgba(141, 183, 255, 0.48);
      outline-offset: 3px;
    }

    .choice-label:has(input:focus-visible) {
      outline: 3px solid rgba(141, 183, 255, 0.48);
      outline-offset: 3px;
    }

    .color-choice.is-answer {
      outline: 5px solid rgba(104, 214, 207, 0.72);
    }

    .color-choice.is-wrong {
      outline: 5px solid rgba(255, 125, 156, 0.72);
    }

    .feedback {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.86);
    }

    .feedback.is-visible {
      animation: popFeedback 680ms ease both;
    }

    .feedback-mark {
      display: grid;
      width: clamp(104px, 28vw, 150px);
      aspect-ratio: 1 / 1;
      place-items: center;
      border-radius: 50%;
      background: var(--surface);
      box-shadow: 0 24px 58px rgba(0, 0, 0, 0.18);
      font-size: clamp(4rem, 15vw, 6.5rem);
      font-weight: 900;
      line-height: 1;
    }

    .feedback.is-correct .feedback-mark {
      color: var(--teal);
    }

    .feedback.is-wrong .feedback-mark {
      color: var(--pink);
    }

    .answer-note {
      min-height: 26px;
      color: var(--muted);
      font-weight: 800;
      text-align: center;
    }

    .answer-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .mini-chip {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 0;
      box-shadow: none;
    }

    .result-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(260px, 0.9fr);
      gap: 22px;
      align-items: stretch;
    }

    .result-main,
    .result-side {
      padding: 28px;
      border: 0;
      border-radius: var(--radius);
      background: var(--surface-glass);
      box-shadow: var(--shadow);
      backdrop-filter: none;
    }

    .score-number {
      margin: 10px 0 6px;
      font-size: clamp(4rem, 16vw, 8rem);
      font-weight: 900;
      line-height: 0.95;
    }

    .score-number span {
      color: var(--accent-strong);
    }

    #resultMessage.is-perfect {
      color: #b00020;
      font-weight: 900;
    }

    .result-stats {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .result-stat {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border: 0;
      border-radius: 14px;
      background: var(--surface-strong);
    }

    .result-stat span {
      color: var(--muted);
      font-weight: 800;
    }

    .result-stat strong {
      font-size: 1.2rem;
    }

    .ghost-button {
      width: 100%;
      margin-top: 20px;
      border: 0;
      background: var(--deep);
      color: #fff;
    }

    .result-actions {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .result-actions .ghost-button {
      margin-top: 0;
    }

    .save-button {
      min-height: 54px;
      width: 100%;
      border-radius: var(--radius);
      border: 0;
      background: var(--selected-bg);
      color: var(--selected-ink);
      font-weight: 900;
      transition: all 0.2s ease;
    }

    .save-button:hover {
      transform: translateY(-2px);
      background: var(--accent-strong);
    }

    .save-button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
      transform: none;
    }

    .result-preview {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .result-preview[hidden] {
      display: none;
    }

    .result-preview span {
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 800;
    }

    .result-preview img {
      display: block;
      width: 100%;
      border-radius: 14px;
      background: var(--surface-strong);
    }

    @keyframes popFeedback {
      0% {
        opacity: 0;
        transform: scale(0.78);
      }

      26% {
        opacity: 1;
        transform: scale(1.08);
      }

      72% {
        opacity: 1;
        transform: scale(1);
      }

      100% {
        opacity: 0;
        transform: scale(1.02);
      }
    }

    @media (max-width: 820px) {
      .app {
        padding: 24px 14px;
        align-items: start;
      }

      .app-header,
      .start-actions,
      .result-layout {
        grid-template-columns: 1fr;
      }

      .app-header,
      .start-actions {
        display: grid;
      }

      .header-actions {
        justify-content: start;
        min-width: 0;
      }

      .settings-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .count-row,
      .difficulty-grid {
        grid-template-columns: 1fr;
      }

      .primary-button {
        width: 100%;
      }

      .quiz-top {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .secondary-button,
      .next-button {
        width: 100%;
      }

      .stage {
        padding: 18px 12px;
      }

      .image-frame {
        width: min(340px, 100%);
      }

      .swatches {
        --swatch-size: clamp(46px, 13vw, 56px);
        gap: clamp(9px, 2.8vw, 12px);
        width: min(460px, 100%);
      }
    }
  </style>
</head>

  <main class="app">
    <section class="screen is-active" id="startScreen">
      <header class="app-header">
        <div class="title-block">
          <div class="eyebrow">THE IDOLM@STER MILLION LIVE!</div>
          <h1>퍼스널 컬러 퀴즈</h1>
        </div>
        <div class="header-actions">
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="다크모드로 전환" aria-pressed="false">
            <span class="theme-icon theme-icon-sun" aria-hidden="true">☀</span>
            <span class="theme-toggle-track" aria-hidden="true">
              <span class="theme-toggle-thumb"></span>
            </span>
            <span class="theme-icon theme-icon-moon" aria-hidden="true">☾</span>
          </button>
        </div>
      </header>

      <div class="settings-grid">
        <fieldset class="panel">
          <legend>그룹 선택</legend>
          <div class="radio-stack">
            <label class="choice-label">
              <input type="radio" name="group" value="allstars" checked>
              <span class="group-choice-main">
                <span class="group-icons">
                  <svg class="group-icon allstars" aria-hidden="true"><use href="#icon-allstars"></use></svg>
                </span>
                <strong>올스타즈</strong>
              </span>
              <span>13명</span>
            </label>
            <label class="choice-label">
              <input type="radio" name="group" value="million">
              <span class="group-choice-main">
                <span class="group-icons">
                  <svg class="group-icon millionstars" aria-hidden="true"><use href="#icon-millionstars"></use></svg>
                </span>
                <strong>밀리언스타즈</strong>
              </span>
              <span>39명</span>
            </label>
            <label class="choice-label">
              <input type="radio" name="group" value="all">
              <span class="group-choice-main">
                <span class="group-icons">
                  <svg class="group-icon allstars" aria-hidden="true"><use href="#icon-allstars"></use></svg>
                  <svg class="group-icon millionstars" aria-hidden="true"><use href="#icon-millionstars"></use></svg>
                </span>
                <strong>전체</strong>
              </span>
              <span>52명</span>
            </label>
          </div>
        </fieldset>

        <section class="panel" aria-labelledby="countTitle">
          <h2 class="panel-title" id="countTitle">문항 수</h2>
          <div class="count-controls">
            <div class="count-row">
              <button class="count-preset is-selected" type="button" data-count="5">5개</button>
              <button class="count-preset" type="button" data-count="10">10개</button>
              <button class="count-preset" type="button" data-count="all">전체</button>
            </div>
            <div class="number-field">
              <label for="questionCount">직접 입력</label>
              <input id="questionCount" type="text" inputmode="numeric" pattern="[0-9]*" max="13" value="5">
            </div>
          </div>
        </section>

        <fieldset class="panel">
          <legend>난이도</legend>
          <div class="difficulty-grid">
            <label class="choice-label">
              <input type="radio" name="difficulty" value="easy">
              <strong>Easy</strong>
            </label>
            <label class="choice-label">
              <input type="radio" name="difficulty" value="normal" checked>
              <strong>Normal</strong>
            </label>
            <label class="choice-label">
              <input type="radio" name="difficulty" value="hard">
              <strong>Hard</strong>
            </label>
          </div>
        </fieldset>
      </div>

      <div class="start-actions">
        <div class="pool-summary">
          <strong id="poolTitle">올스타즈 13명</strong>
          <span id="poolMeta">5문항 · Normal</span>
        </div>
        <button class="primary-button" id="startButton" type="button">게임 시작</button>
      </div>
    </section>

    <section class="screen" id="quizScreen" aria-live="polite">
      <div class="quiz-shell">
        <div class="quiz-nav">
          <button class="back-button" id="homeButton" type="button" aria-label="메인 화면으로 돌아가기">❮ 이전</button>
        </div>
        <div class="quiz-progress">
          <div class="quiz-top">
            <div class="stat">
              <span>문항</span>
              <strong id="progressText">1 / 5</strong>
            </div>
            <div class="stat">
              <span>정답</span>
              <strong id="scoreText">0</strong>
            </div>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-bar" id="progressBar"></div>
          </div>
        </div>

        <div class="stage">
          <div class="image-frame" id="imageFrame">
            <img id="characterImage" alt="">
            <div class="image-fallback" id="imageFallback">
              <div class="fallback-name" id="fallbackName"></div>
            </div>
          </div>
          <div class="caption">
            <strong id="characterName"></strong>
            <span id="characterMeta"></span>
          </div>
          <div class="swatches" id="swatches"></div>
          <div class="answer-note" id="answerNote"></div>
          <button class="next-button" id="nextButton" type="button" hidden>확인</button>
          <div class="feedback" id="feedback">
            <div class="feedback-mark" id="feedbackMark">O</div>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" id="resultScreen">
      <div class="result-layout">
        <div class="result-main">
          <div class="eyebrow">RESULT</div>
          <h2 id="resultMessage">완료</h2>
          <div class="score-number"><span id="scorePercent">0</span>점</div>
          <p class="subtitle" id="scoreSummary">0 / 0 정답</p>
        </div>
        <div class="result-side">
          <h2 class="panel-title">기록</h2>
          <div class="result-stats">
            <div class="result-stat">
              <span>맞춘 개수</span>
              <strong id="resultCorrect">0</strong>
            </div>
            <div class="result-stat">
              <span>문항 수</span>
              <strong id="resultTotal">0</strong>
            </div>
            <div class="result-stat">
              <span>난이도</span>
              <strong id="resultDifficulty">Normal</strong>
            </div>
            <div class="result-stat">
              <span>그룹</span>
              <strong id="resultGroup">전체</strong>
            </div>
          </div>

    function getInitialTheme() {
      try {
        const storedTheme = window.localStorage?.getItem(themeStorageKey);
        if (storedTheme === "light" || storedTheme === "dark") return storedTheme;
      } catch (error) {
        // Local storage can be unavailable in restricted browser contexts.
      }

      return window.matchMedia?.("(prefers-color-scheme: dark)")?.matches ? "dark" : "light";
    }

    function applyTheme(theme, shouldStore = false) {
      const normalizedTheme = theme === "dark" ? "dark" : "light";
      document.documentElement.dataset.theme = normalizedTheme;
      themeToggle.setAttribute("aria-pressed", String(normalizedTheme === "dark"));
      themeToggle.setAttribute("aria-label", normalizedTheme === "dark" ? "라이트모드로 전환" : "다크모드로 전환");

      if (shouldStore) {
        try {
          window.localStorage?.setItem(themeStorageKey, normalizedTheme);
        } catch (error) {
          // The selected theme still applies for the current page.
        }
      }
    }

    function startGame() {
      const pool = shuffle(getPool());

      state.correct = 0;
      state.difficulty = document.querySelector("input[name='difficulty']:checked").value;
      state.group = document.querySelector("input[name='group']:checked").value;
      showScreen("quiz");
      renderQuestion();
    }

    function renderQuestion() {
      state.locked = false;
      const question = state.questions[state.index];
      const current = state.index + 1;
      const total = state.questions.length;

      setProgress((current - 1) / total);
      scoreText.textContent = String(state.correct);
      characterName.textContent = question.name;

      answerNote.innerHTML = "";
      feedback.className = "feedback";
      nextButton.hidden = true;
      nextButton.textContent = "확인";

      setQuestionImage(question);
      renderChoices(question);

      const choices = shuffleChoices(question, state.difficulty, [
        { hex: question.hex, isAnswer: true },
        ...distractors.map((hex) => ({ hex, isAnswer: false }))
      ]);

      swatches.innerHTML = "";
      choices.forEach((choice, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "color-choice";
        button.style.background = choice.hex;
        button.dataset.hex = choice.hex.toLowerCase();
        button.setAttribute("aria-label", `${index + 1}번 색상`);
        button.addEventListener("click", () => judgeAnswer(button, choice, question));
        swatches.appendChild(button);
      });
    }

    function shuffleChoices(question, difficulty, choices) {
      const key = `${difficulty}-${question.no}`;
      const lastSignature = lastChoiceSignatures.get(key);
      let shuffled = shuffle(choices);
      let signature = getChoiceSignature(shuffled);
      let attempts = 0;

      while (signature === lastSignature && attempts < 12) {
        shuffled = shuffle(choices);
        signature = getChoiceSignature(shuffled);
        attempts += 1;
      }

      lastChoiceSignatures.set(key, signature);
      return shuffled;
    }

    function getChoiceSignature(choices) {
      return choices.map((choice) => `${choice.hex.toLowerCase()}${choice.isAnswer ? "!" : ""}`).join("|");
    }

    function judgeAnswer(button, choice, question) {
      if (state.locked) return;
      state.locked = true;

      const isCorrect = choice.isAnswer;
      if (isCorrect) {
        state.correct += 1;
        button.classList.add("is-answer");
        answerNote.innerHTML = `<span class="answer-chip"><span class="mini-chip" style="background:${question.hex}"></span>정답은 ${question.hex}</span>`;
      } else {
        button.classList.add("is-wrong");
        const answerButton = [...swatches.children].find((item) => item.dataset.hex === question.hex.toLowerCase());
        if (answerButton) answerButton.classList.add("is-answer");
        answerNote.innerHTML = `<span class="answer-chip"><span class="mini-chip" style="background:${question.hex}"></span>정답은 ${question.hex}</span>`;
      }

      feedbackMark.textContent = isCorrect ? "O" : "X";
      feedback.className = `feedback is-visible ${isCorrect ? "is-correct" : "is-wrong"}`;
      scoreText.textContent = String(state.correct);
      setProgress((state.index + 1) / state.questions.length);
      [...swatches.children].forEach((item) => {
        item.disabled = true;
      });
      nextButton.textContent = state.index + 1 >= state.questions.length ? "결과 보기" : "확인";
      nextButton.hidden = false;
      nextButton.focus();
    }

    function setProgress(ratio) {
      progressBar.style.transform = `scaleX(${clamp(ratio, 0, 1)})`;
    }

    function continueAfterFeedback() {
      if (!state.locked) return;
      state.index += 1;
      if (state.index >= state.questions.length) {
        showResult();
      } else {
        renderQuestion();
      }
    }

    function showResult() {
      const total = state.questions.length;
      const percent = Math.round((state.correct / total) * 100);
      document.getElementById("scorePercent").textContent = String(percent);
      document.getElementById("scoreSummary").textContent = `${state.correct} / ${total} 정답`;
      document.getElementById("resultCorrect").textContent = `${state.correct}개`;
      document.getElementById("resultTotal").textContent = `${total}개`;
      document.getElementById("resultDifficulty").textContent = difficultyLabels[state.difficulty];
      document.getElementById("resultGroup").textContent = groupLabels[state.group];
      const resultMessage = document.getElementById("resultMessage");
      resultMessage.textContent = getResultMessage(percent);
      resultMessage.classList.toggle("is-perfect", percent === 100);
      showScreen("result");
    }

    async function saveResultImage() {
      const originalText = saveResultButton.textContent;
      saveResultButton.disabled = true;
      saveResultButton.textContent = "저장 중";

      try {
        const canvas = createResultCanvas();
        const dataUrl = canvas.toDataURL("image/png");
        resultPreviewImage.src = dataUrl;
        resultPreview.hidden = false;

        const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png", 1));
        if (!blob) throw new Error("결과 이미지를 만들 수 없습니다.");

        const fileName = `million-live-color-result-${new Date().toISOString().slice(0, 10)}.png`;
        let shared = false;

        if (navigator.canShare && window.File) {
          const file = new File([blob], fileName, { type: "image/png" });
          if (navigator.canShare({ files: [file] })) {
            try {
              await navigator.share({
                files: [file],
                title: "밀리언 라이브 퍼스널 컬러 퀴즈 결과",
                text: document.getElementById("scoreSummary").textContent
              });
              shared = true;
            } catch (error) {
              shared = false;
            }
          }
        }

        if (!shared) {
          downloadBlob(blob, fileName);
        }
      } catch (error) {
        window.alert("결과 이미지를 저장하지 못했습니다.");
      } finally {
        saveResultButton.disabled = false;
        saveResultButton.textContent = originalText;
      }
    }

    function createResultCanvas() {
      const canvas = document.createElement("canvas");
      const size = 1080;
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");
      const isDark = document.documentElement.dataset.theme === "dark";
      const colors = {
        bg: isDark ? "#111118" : "#f4f5f7",
        card: isDark ? "#1a1a24" : "#ffffff",
        chip: isDark ? "#232330" : "#eceef3",
        text: isDark ? "#f4f6fb" : "#171821",
        muted: isDark ? "#a4a8b6" : "#6d7180",
        accent: "#8db7ff",
        perfect: "#b00020"
      };

      const percent = document.getElementById("scorePercent").textContent;
      const message = document.getElementById("resultMessage").textContent;
      const isPerfect = document.getElementById("resultMessage").classList.contains("is-perfect");
      const stats = [
        ["맞춘 개수", document.getElementById("resultCorrect").textContent],
        ["문항 수", document.getElementById("resultTotal").textContent],
        ["난이도", document.getElementById("resultDifficulty").textContent],
        ["그룹", document.getElementById("resultGroup").textContent]
      ];

      ctx.fillStyle = colors.bg;
      ctx.fillRect(0, 0, size, size);
      drawRoundRect(ctx, 96, 96, 888, 888, 42, colors.card);

      ctx.fillStyle = colors.muted;
      ctx.font = `800 30px ${appFontStack}`;
      ctx.textAlign = "center";
      ctx.fillText("THE IDOLM@STER MILLION LIVE!", size / 2, 188);

      ctx.fillStyle = isPerfect ? colors.perfect : colors.text;
      ctx.font = `${isPerfect ? "900" : "850"} 74px ${appFontStack}`;
      ctx.fillText(message, size / 2, 305);

      ctx.fillStyle = colors.accent;
      ctx.font = `900 190px ${appFontStack}`;
      ctx.fillText(`${percent}`, size / 2, 510);
      ctx.fillStyle = colors.text;
      ctx.font = `900 56px ${appFontStack}`;
      ctx.fillText("점", size / 2 + 185, 492);

      ctx.fillStyle = colors.muted;
      ctx.font = `800 34px ${appFontStack}`;
      ctx.fillText(document.getElementById("scoreSummary").textContent, size / 2, 590);

      stats.forEach(([label, value], index) => {
        const y = 670 + index * 72;
        drawRoundRect(ctx, 210, y - 42, 660, 54, 18, colors.chip);
        ctx.textAlign = "left";
        ctx.fillStyle = colors.muted;
        ctx.font = `800 26px ${appFontStack}`;
        ctx.fillText(label, 250, y - 6);
        ctx.textAlign = "right";
        ctx.fillStyle = colors.text;
        ctx.font = `900 30px ${appFontStack}`;
        ctx.fillText(value, 830, y - 6);
      });

      ctx.textAlign = "center";
      ctx.fillStyle = colors.muted;
      ctx.font = `700 24px ${appFontStack}`;
      ctx.fillText("Personal Color Quiz", size / 2, 935);
      return canvas;
    }

    function drawRoundRect(ctx, x, y, width, height, radius, fillStyle) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
      ctx.fillStyle = fillStyle;
      ctx.fill();
    }

    function downloadBlob(blob, fileName) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function resetGame() {
      state.questions = [];
      state.index = 0;
      state.correct = 0;
      state.locked = false;
      nextButton.hidden = true;
      resultPreview.hidden = true;
      resultPreviewImage.removeAttribute("src");
      showScreen("start");
      updateStartSummary();
    }

    function showScreen(name) {
      Object.values(screens).forEach((screen) => screen.classList.remove("is-active"));
      screens[name].classList.add("is-active");
    }

    function getPool() {
      const selected = document.querySelector("input[name='group']:checked")?.value || state.group;
      if (selected === "allstars") {
        return enrichedIdols.filter((idol) => idol.group === "765PRO ALLSTARS");
      }
      if (selected === "million") {
        return enrichedIdols.filter((idol) => idol.group === "MILLION LIVE! THEATER");
      }
      return enrichedIdols;
    }

    function updateStartSummary() {
      const poolSize = getPool().length;
      const group = document.querySelector("input[name='group']:checked")?.value || state.group;
      const difficulty = document.querySelector("input[name='difficulty']:checked")?.value || state.difficulty;
      const count = getQuestionCountValue(poolSize);
      questionCountInput.max = String(poolSize);
      poolTitle.textContent = `${groupLabels[group]} ${poolSize}명`;
      poolMeta.textContent = `${count}문항 · ${difficultyLabels[difficulty]}`;
    }

    function normalizeQuestionCount(poolSize = getPool().length) {
      const count = getQuestionCountValue(poolSize);
      questionCountInput.max = String(poolSize);
      questionCountInput.value = String(count);
      updatePresetSelection();
      updateStartSummary();
      return count;
    }

    function getQuestionCountValue(poolSize = getPool().length) {
      const rawValue = Number(questionCountInput.value);
      if (questionCountInput.value.trim() === "" || !Number.isFinite(rawValue)) return 1;
      return clamp(Math.trunc(rawValue), 1, poolSize);
    }

    function updatePresetSelection(activeButton = null) {
      const poolSize = getPool().length;
      const value = Number(questionCountInput.value);
      document.querySelectorAll(".count-preset").forEach((button) => {
        const matches = activeButton
          ? button === activeButton
          : (button.dataset.count === "all" && value === poolSize) || Number(button.dataset.count) === value;
        button.classList.toggle("is-selected", matches);
      });
    }

    function setQuestionImage(question) {
      imageFrame.classList.remove("is-missing");
      imageFallback.style.background = makeFallbackBackground(question.hex);
      fallbackName.textContent = question.name;
      characterImage.alt = `${question.name} 일러스트`;
      characterImage.onload = () => imageFrame.classList.remove("is-missing");
      characterImage.onerror = () => imageFrame.classList.add("is-missing");
      characterImage.src = question.image;
    }

    function generateDistractors(question, difficulty) {
      const targetDistractorCount = 5;
      const correctHex = question.hex.toLowerCase();
      const base = question.hsl;
      const distanceRules = getVisualDistanceRules(difficulty);
      const colors = new Set();

      const addColor = (hex, relaxation = 0) => {
        const normalized = hex.toLowerCase();
        if (
          normalized !== correctHex
          && !colors.has(normalized)
          && isVisuallyDistinctChoice(normalized, correctHex, [...colors], distanceRules, relaxation)
        ) {
          colors.add(normalized);
          return true;
        }
        return false;
      };

      addHairTrapColor(question, addColor);

      if (difficulty === "easy") {
        fillGenerated(colors, targetDistractorCount, () => {
          const hue = base.h + randomBetween(70, 290);
          const saturation = randomBetween(52, 88);
          const lightness = randomBetween(34, 76);
          return hslToHex(hue, saturation, lightness);
        }, addColor);
      } else if (difficulty === "normal") {
        fillGenerated(colors, targetDistractorCount, () => {
          const hueShift = randomBetween(20, 30) * randomSign();
          const saturationShift = randomBetween(12, 24) * randomSign();
          const lightnessShift = randomBetween(10, 18) * randomSign();
          return hslToHex(
            base.h + hueShift,
            clamp(base.s + saturationShift, 18, 94),
            clamp(base.l + lightnessShift, 18, 88)
          );
        }, addColor);
      } else {
        let realTrapCount = 0;
        const realTrapTarget = randomInteger(1, 2);
        closestRealColors(question, 8).forEach((hex) => {
          if (realTrapCount < realTrapTarget && addColor(hex)) {
            realTrapCount += 1;
          }
        });

        fillGenerated(colors, targetDistractorCount, () => {
          const mode = ["hue", "tone", "mixed"][Math.floor(Math.random() * 3)];
          const hueShift = randomBetween(6, 12) * randomSign();
          const saturationShift = randomBetween(6, 12) * randomSign();
          const lightnessShift = randomBetween(6, 12) * randomSign();

          if (mode === "hue") {
            return hslToHex(base.h + hueShift, base.s, base.l);
          }

          if (mode === "tone") {
            return hslToHex(
              base.h,
              clamp(base.s + saturationShift, 8, 96),
              clamp(base.l + lightnessShift, 12, 92)
            );
          }

          return hslToHex(
            base.h + hueShift,
            clamp(base.s + saturationShift, 8, 96),
            clamp(base.l + lightnessShift, 12, 92)
          );
        }, addColor);
      }

      return [...colors].slice(0, targetDistractorCount);
    }

    function addHairTrapColor(question, addColor) {
      for (let attempt = 0; attempt < 40; attempt += 1) {
        if (addColor(makeHairTrapColor(question, attempt))) return;
      }

      const hair = question.hairHsl || {
        h: question.hsl.h + 34,
        s: clamp(question.hsl.s - 18, 12, 76),
        l: clamp(question.hsl.l - 16, 14, 72)
      };

      addColor(hslToHex(
        hair.h + randomBetween(16, 28) * randomSign(),
        clamp(hair.s + randomBetween(10, 18) * randomSign(), 10, 92),
        clamp(hair.l + randomBetween(10, 18) * randomSign(), 10, 88)
      ), 3);
    }

    function makeHairTrapColor(question, attempt = 0) {
      const hair = question.hairHsl || {
        h: question.hsl.h + 34,
        s: clamp(question.hsl.s - 18, 12, 76),
        l: clamp(question.hsl.l - 16, 14, 72)
      };
      const hueRange = attempt < 16 ? 4 : 12;
      const toneRange = attempt < 16 ? 6 : 14;
      let candidate = hslToHex(
        hair.h + randomBetween(-hueRange, hueRange),
        clamp(hair.s + randomBetween(-toneRange, toneRange), 10, 92),
        clamp(hair.l + randomBetween(-toneRange, toneRange), 10, 88)
      );

      if (candidate.toLowerCase() === question.hex.toLowerCase()) {
        candidate = hslToHex(hair.h + 12, clamp(hair.s + 4, 10, 92), clamp(hair.l - 6, 10, 88));
      }

      return candidate;
    }

    function fillGenerated(colors, targetCount, factory, addColor) {
      let guard = 0;
      while (colors.size < targetCount && guard < 120) {
        addColor(factory());
        guard += 1;
      }

      let fallbackGuard = 0;
      while (colors.size < targetCount && fallbackGuard < 220) {
        addColor(hslToHex(Math.random() * 360, randomBetween(36, 86), randomBetween(28, 80)));
        fallbackGuard += 1;
      }

      let relaxedGuard = 0;
      while (colors.size < targetCount && relaxedGuard < 220) {
        addColor(hslToHex(Math.random() * 360, randomBetween(36, 86), randomBetween(28, 80)), 4);
        relaxedGuard += 1;
      }
    }

    function closestRealColors(question, count) {
      const correctHex = question.hex.toLowerCase();
      const ranked = enrichedIdols
        .filter((idol) => idol.no !== question.no && idol.hex.toLowerCase() !== correctHex)
        .map((idol) => ({
          idol,
          hueGap: hueDistance(question.hsl.h, idol.hsl.h),
          toneGap: Math.abs(question.hsl.s - idol.hsl.s) + Math.abs(question.hsl.l - idol.hsl.l)
        }))
        .sort((a, b) => a.hueGap - b.hueGap || a.toneGap - b.toneGap);
      const picked = ranked.slice(0, 1);

      if (count > 1) {
        picked.push(...shuffle(ranked.slice(1, 6)).slice(0, count - 1));
      }

      return picked.map(({ idol }) => idol.hex);
    }

    function getVisualDistanceRules(difficulty) {
      if (difficulty === "easy") {
        return { minFromAnswer: 30, minBetweenChoices: 16 };
      }

      if (difficulty === "normal") {
        return { minFromAnswer: 19, minBetweenChoices: 12 };
      }

      return { minFromAnswer: 12, minBetweenChoices: 8, maxFromAnswer: 40 };
    }

    function isVisuallyDistinctChoice(candidateHex, correctHex, selectedHexes, rules, relaxation = 0) {
      const minFromAnswer = Math.max(10, rules.minFromAnswer - relaxation);
      const minBetweenChoices = Math.max(7, rules.minBetweenChoices - relaxation);
      const distanceFromAnswer = perceptualColorDistance(candidateHex, correctHex);

      if (distanceFromAnswer < minFromAnswer) {
        return false;
      }

      if (rules.maxFromAnswer && distanceFromAnswer > rules.maxFromAnswer + relaxation * 2) {
        return false;
      }

      return selectedHexes.every((hex) => perceptualColorDistance(candidateHex, hex) >= minBetweenChoices);
    }

    function perceptualColorDistance(hexA, hexB) {
      const a = rgbToLab(hexToRgb(hexA));
      const b = rgbToLab(hexToRgb(hexB));
      return Math.hypot(a.l - b.l, a.a - b.a, a.b - b.b);
    }

    function rgbToLab({ r, g, b }) {
      const linearR = srgbToLinear(r / 255);
      const linearG = srgbToLinear(g / 255);
      const linearB = srgbToLinear(b / 255);

      const x = (0.4124 * linearR + 0.3576 * linearG + 0.1805 * linearB) / 0.95047;
      const y = (0.2126 * linearR + 0.7152 * linearG + 0.0722 * linearB);
      const z = (0.0193 * linearR + 0.1192 * linearG + 0.9505 * linearB) / 1.08883;

      const fx = labPivot(x);
      const fy = labPivot(y);
      const fz = labPivot(z);

      return {
        l: 116 * fy - 16,
        a: 500 * (fx - fy),
        b: 200 * (fy - fz)
      };
    }

    function srgbToLinear(value) {
      return value <= 0.04045 ? value / 12.92 : ((value + 0.055) / 1.055) ** 2.4;
    }

    function labPivot(value) {
      return value > 0.008856 ? Math.cbrt(value) : 7.787 * value + 16 / 116;
    }

    function hexToRgb(hex) {
      const normalized = hex.replace("#", "").trim();
      const value = parseInt(normalized.length === 3 ? normalized.split("").map((c) => c + c).join("") : normalized, 16);
      return {
        r: (value >> 16) & 255,
        g: (value >> 8) & 255,
        b: value & 255
      };
    }

    function rgbToHsl(r, g, b) {
      r /= 255;
      g /= 255;
      b /= 255;
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      let h = 0;
      let s = 0;
      const l = (max + min) / 2;

      if (max !== min) {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        if (max === r) h = (g - b) / d + (g < b ? 6 : 0);
        if (max === g) h = (b - r) / d + 2;
        if (max === b) h = (r - g) / d + 4;
        h *= 60;
      }

      return { h, s: s * 100, l: l * 100 };
    }

    function hexToHsl(hex) {
      const { r, g, b } = hexToRgb(hex);
      return rgbToHsl(r, g, b);
    }

    function hslToRgb(h, s, l) {
      h = ((h % 360) + 360) % 360;
      s = clamp(s, 0, 100) / 100;
      l = clamp(l, 0, 100) / 100;
      const c = (1 - Math.abs(2 * l - 1)) * s;
      const x = c * (1 - Math.abs((h / 60) % 2 - 1));
      const m = l - c / 2;
      let r = 0;
      let g = 0;
      let b = 0;

      if (h < 60) [r, g, b] = [c, x, 0];
      else if (h < 120) [r, g, b] = [x, c, 0];
      else if (h < 180) [r, g, b] = [0, c, x];
      else if (h < 240) [r, g, b] = [0, x, c];
      else if (h < 300) [r, g, b] = [x, 0, c];
      else [r, g, b] = [c, 0, x];

      return {
        r: Math.round((r + m) * 255),
        g: Math.round((g + m) * 255),
        b: Math.round((b + m) * 255)
      };
    }

    function hslToHex(h, s, l) {
      const { r, g, b } = hslToRgb(h, s, l);
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    function toHex(value) {
      return clamp(Math.round(value), 0, 255).toString(16).padStart(2, "0");
    }

    function hueDistance(a, b) {
      const diff = Math.abs(a - b) % 360;
      return Math.min(diff, 360 - diff);
    }

    function makeFallbackBackground(hex) {
      const { h, s, l } = hexToHsl(hex);
      const darker = hslToHex(h, clamp(s + 8, 15, 95), clamp(l - 18, 16, 58));
      const lighter = hslToHex(h + 18, clamp(s + 4, 18, 95), clamp(l + 12, 42, 82));
      return `linear-gradient(145deg, ${lighter}, ${hex} 48%, ${darker})`;
    }

    function getResultMessage(percent) {
      if (percent === 100) return "당신이 아이돌마스터";
      if (percent >= 70) return "밀청년";
      if (percent >= 45) return "밀민이";
      if (percent >= 1) return "놀안분?";
      return "ㅁㅎ";
    }

    function shuffle(items) {
      const copied = [...items];
      for (let i = copied.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function randomBetween(min, max) {
      return min + Math.random() * (max - min);
    }

    function randomInteger(min, max) {
      return Math.floor(randomBetween(min, max + 1));
    }

    function randomSign() {
      return Math.random() < 0.5 ? -1 : 1;
    }
  </script>
