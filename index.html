<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아이돌마스터 퍼스널 컬러 맞추기</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%238db7ff'/%3E%3Ccircle cx='32' cy='32' r='17' fill='%23fff'/%3E%3C/svg%3E">
  <!-- style.css contains the full UI styling that used to live in the inline <style> block. -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="screen is-active" id="startScreen">
      <header class="app-header">
        <div class="title-block">
          <div class="eyebrow">THE IDOLM@STER</div>
          <h1>퍼스널 컬러 맞추기</h1>
        </div>
        <div class="header-actions">
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="다크모드로 전환" aria-pressed="false">
            <span class="theme-icon theme-icon-sun" aria-hidden="true">☀</span>
            <span class="theme-toggle-track" aria-hidden="true">
              <span class="theme-toggle-thumb"></span>
            </span>
            <span class="theme-icon theme-icon-moon" aria-hidden="true">☾</span>
          </button>
        </div>
      </header>

      <div class="settings-grid">
        <fieldset class="panel series-panel">
          <legend>시리즈 선택</legend>
          <div class="series-grid">
            <label class="choice-label series-card-all">
              <input type="checkbox" name="series" value="all" checked>
              <span class="group-choice-main">
                <span class="group-icons">
                  <span class="series-logo-badge allstars">
                    <img class="series-icon-img" src="assets/icons/allstars.svg" alt="">
                  </span>
                  <span class="series-logo-badge millionstars">
                    <img class="series-icon-img" src="assets/icons/millionstars.svg" alt="">
                  </span>
                  <span class="series-logo-badge shinycolors">
                    <img class="series-icon-img" src="assets/icons/shinycolors.svg" alt="">
                  </span>
                  <span class="series-logo-badge gakuen">
                    <img class="series-icon-img" src="assets/icons/gakuen.svg" alt="">
                  </span>
                </span>
                <strong>전체</strong>
              </span>
              <span>93명</span>
            </label>
            <label class="choice-label">
              <input type="checkbox" name="series" value="allstars">
              <span class="group-choice-main">
                <span class="group-icons">
                  <span class="series-logo-badge allstars">
                    <img class="series-icon-img" src="assets/icons/allstars.svg" alt="">
                  </span>
                </span>
                <strong>올스타즈</strong>
              </span>
              <span>13명</span>
            </label>
            <label class="choice-label">
              <input type="checkbox" name="series" value="million">
              <span class="group-choice-main">
                <span class="group-icons">
                  <span class="series-logo-badge millionstars">
                    <img class="series-icon-img" src="assets/icons/millionstars.svg" alt="">
                  </span>
                </span>
                <strong>밀리언 스타즈</strong>
              </span>
              <span>39명</span>
            </label>
            <label class="choice-label">
              <input type="checkbox" name="series" value="shiny">
              <span class="group-choice-main">
                <span class="group-icons">
                  <span class="series-logo-badge shinycolors">
                    <img class="series-icon-img" src="assets/icons/shinycolors.svg" alt="">
                  </span>
                </span>
                <strong>샤이니 컬러즈</strong>
              </span>
              <span>28명</span>
            </label>
            <label class="choice-label">
              <input type="checkbox" name="series" value="gakuen">
              <span class="group-choice-main">
                <span class="group-icons">
                  <span class="series-logo-badge gakuen">
                    <img class="series-icon-img" src="assets/icons/gakuen.svg" alt="">
                  </span>
                </span>
                <strong>학원 아이돌마스터</strong>
              </span>
              <span>13명</span>
            </label>
          </div>
        </fieldset>

        <section class="panel" aria-labelledby="countTitle">
          <h2 class="panel-title" id="countTitle">문항 수</h2>
          <div class="count-controls">
            <div class="count-row">
              <button class="count-preset is-selected" type="button" data-count="5">5개</button>
              <button class="count-preset" type="button" data-count="10">10개</button>
              <button class="count-preset" type="button" data-count="all">전체</button>
            </div>
            <div class="number-field">
              <label for="questionCount">직접 입력</label>
              <input id="questionCount" type="text" inputmode="numeric" pattern="[0-9]*" max="93" value="5">
            </div>
          </div>
        </section>

        <fieldset class="panel">
          <legend>난이도</legend>
          <div class="difficulty-grid">
            <label class="choice-label">
              <input type="radio" name="difficulty" value="easy">
              <strong>Easy</strong>
            </label>
            <label class="choice-label">
              <input type="radio" name="difficulty" value="normal" checked>
              <strong>Normal</strong>
            </label>
            <label class="choice-label">
              <input type="radio" name="difficulty" value="hard">
              <strong>Hard</strong>
            </label>
            <label class="choice-label">
              <input type="radio" name="difficulty" value="very-hard">
              <strong>Very Hard</strong>
            </label>
          </div>
        </fieldset>
      </div>

      <div class="start-actions">
        <div class="pool-summary">
          <div class="pool-summary-head">
            <span class="pool-kicker">선택한 시리즈</span>
          </div>
          <div class="pool-series-list" id="poolSeriesList" aria-label="선택한 시리즈"></div>
          <div class="pool-meta-row">
            <strong id="poolTitle">총 93명</strong>
            <span id="poolMeta">5문항 · Normal</span>
          </div>
        </div>
        <button class="primary-button" id="startButton" type="button">게임 시작</button>
      </div>
    </section>

    <section class="screen" id="quizScreen" aria-live="polite">
      <div class="quiz-shell">
        <div class="quiz-nav">
          <button class="back-button" id="homeButton" type="button" aria-label="메인 화면으로 돌아가기">❮ 이전</button>
        </div>
        <div class="quiz-progress">
          <div class="quiz-top">
            <div class="stat">
              <span>문항</span>
              <strong id="progressText">1 / 5</strong>
            </div>
            <div class="stat">
              <span>정답</span>
              <strong id="scoreText">0</strong>
            </div>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-bar" id="progressBar"></div>
          </div>
        </div>

        <div class="stage">
          <div class="image-frame" id="imageFrame">
            <img id="characterImage" alt="">
            <div class="image-fallback" id="imageFallback">
              <div class="fallback-name" id="fallbackName"></div>
            </div>
          </div>
          <div class="caption">
            <strong id="characterName"></strong>
            <span id="characterMeta"></span>
          </div>
          <div class="swatches" id="swatches"></div>
          <div class="answer-note" id="answerNote"></div>
          <button class="next-button" id="nextButton" type="button" hidden>확인</button>
          <div class="feedback" id="feedback">
            <div class="feedback-mark" id="feedbackMark">O</div>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" id="resultScreen">
      <div class="result-layout">
        <div class="result-main">
          <div class="eyebrow">RESULT</div>
          <h2 id="resultMessage">완료</h2>
          <div class="score-number"><span id="scorePercent">0</span>점</div>
          <p class="subtitle" id="scoreSummary">0 / 0 정답</p>
        </div>
        <div class="result-side">
          <h2 class="panel-title">기록</h2>
          <div class="result-stats">
            <div class="result-stat">
              <span>맞춘 개수</span>
              <strong id="resultCorrect">0</strong>
            </div>
            <div class="result-stat">
              <span>문항 수</span>
              <strong id="resultTotal">0</strong>
            </div>
            <div class="result-stat">
              <span>난이도</span>
              <strong id="resultDifficulty">Normal</strong>
            </div>
            <div class="result-stat result-stat-series">
              <span>시리즈</span>
              <div class="result-series-list" id="resultGroup" aria-label="선택한 시리즈"></div>
            </div>
          </div>
          <div class="result-actions">
            <button class="save-button" id="saveResultButton" type="button">결과 저장</button>
            <button class="ghost-button" id="resetButton" type="button">처음으로 돌아가기</button>
          </div>
          <div class="result-preview" id="resultPreview" hidden>
            <span>결과 이미지</span>
            <img id="resultPreviewImage" alt="퀴즈 결과 이미지">
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- data.js must load first because script.js reads window.IdolmasterQuizData. -->
  <script src="data.js"></script>
  <!-- script.js wires the UI events and game flow after the data is ready. -->
  <script src="script.js"></script>
</body>
</html>
