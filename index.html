<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <!-- style.css contains the full UI styling that used to live in the inline <style> block. -->
  <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>
  <main class="app">
    <section class="screen is-active" id="startScreen">
      <header class="app-header">
        <div class="title-block">
          <h1>
            <span id="brandTitle"></span>
            <span id="mainTitle"></span>
          </h1>
        </div>
        <div class="header-actions">
          <div class="language-toggle" role="group" aria-label="Language">
            <button class="language-button is-selected" type="button" data-language="ko" aria-pressed="true">
              <span class="language-flag flag-kr" aria-hidden="true"></span>
              <span class="language-code">KR</span>
            </button>
            <button class="language-button" type="button" data-language="jp" aria-pressed="false">
              <span class="language-flag flag-jp" aria-hidden="true"></span>
              <span class="language-code">JP</span>
            </button>
            <button class="language-button" type="button" data-language="en" aria-pressed="false">
              <span class="language-flag flag-en" aria-hidden="true"></span>
              <span class="language-code">EN</span>
            </button>
          </div>
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="" aria-pressed="false">
            <span class="theme-icon theme-icon-sun" aria-hidden="true">☀</span>
            <span class="theme-toggle-track" aria-hidden="true">
              <span class="theme-toggle-thumb"></span>
            </span>
            <span class="theme-icon theme-icon-moon" aria-hidden="true">☾</span>
          </button>
        </div>
      </header>

      <div class="settings-grid">
        <fieldset class="panel series-panel">
          <legend></legend>
          <div class="series-grid">
            <label class="choice-label series-card-all">
              <input type="checkbox" name="series" value="all" checked>
              <span class="group-choice-main">
                <span class="group-icons">
                  <span class="series-logo-badge allstars">
                    <img class="series-icon-img" src="assets/icons/allstars.svg" alt="">
                  </span>
                  <span class="series-logo-badge millionstars">
                    <img class="series-icon-img" src="assets/icons/millionstars.svg" alt="">
                  </span>
                  <span class="series-logo-badge cinderella">
                    <img class="series-icon-img" src="assets/icons/cinderella.svg" alt="">
                  </span>
                  <span class="series-logo-badge shinycolors">
                    <img class="series-icon-img" src="assets/icons/shinycolors.svg" alt="">
                  </span>
                  <span class="series-logo-badge gakuen">
                    <img class="series-icon-img" src="assets/icons/gakuen.svg" alt="">
                  </span>
                  <span class="series-logo-badge sidem">
                    <img class="series-icon-img" src="assets/icons/sidem.svg" alt="">
                  </span>
                </span>
                <strong></strong>
              </span>
              <span></span>
            </label>
            <label class="choice-label">
              <input type="checkbox" name="series" value="allstars">
              <span class="group-choice-main">
                <span class="group-icons">
                  <span class="series-logo-badge allstars">
                    <img class="series-icon-img" src="assets/icons/allstars.svg" alt="">
                  </span>
                </span>
                <strong></strong>
              </span>
              <span></span>
            </label>
            <label class="choice-label">
              <input type="checkbox" name="series" value="million">
              <span class="group-choice-main">
                <span class="group-icons">
                  <span class="series-logo-badge millionstars">
                    <img class="series-icon-img" src="assets/icons/millionstars.svg" alt="">
                  </span>
                </span>
                <strong></strong>
              </span>
              <span></span>
            </label>
            <label class="choice-label">
              <input type="checkbox" name="series" value="cinderella">
              <span class="group-choice-main">
                <span class="group-icons">
                  <span class="series-logo-badge cinderella">
                    <img class="series-icon-img" src="assets/icons/cinderella.svg" alt="">
                  </span>
                </span>
                <strong></strong>
              </span>
              <span></span>
            </label>
            <label class="choice-label">
              <input type="checkbox" name="series" value="shiny">
              <span class="group-choice-main">
                <span class="group-icons">
                  <span class="series-logo-badge shinycolors">
                    <img class="series-icon-img" src="assets/icons/shinycolors.svg" alt="">
                  </span>
                </span>
                <strong></strong>
              </span>
              <span></span>
            </label>
            <label class="choice-label">
              <input type="checkbox" name="series" value="gakuen">
              <span class="group-choice-main">
                <span class="group-icons">
                  <span class="series-logo-badge gakuen">
                    <img class="series-icon-img" src="assets/icons/gakuen.svg" alt="">
                  </span>
                </span>
                <strong></strong>
              </span>
              <span></span>
            </label>
            <label class="choice-label">
              <input type="checkbox" name="series" value="sidem">
              <span class="group-choice-main">
                <span class="group-icons">
                  <span class="series-logo-badge sidem">
                    <img class="series-icon-img" src="assets/icons/sidem.svg" alt="">
                  </span>
                </span>
                <strong></strong>
              </span>
              <span></span>
            </label>
          </div>
        </fieldset>

        <section class="panel" aria-labelledby="countTitle">
          <h2 class="panel-title" id="countTitle"></h2>
          <div class="count-controls">
            <div class="count-row">
              <button class="count-preset is-selected" type="button" data-count="5"></button>
              <button class="count-preset" type="button" data-count="10"></button>
              <button class="count-preset" type="button" data-count="all"></button>
            </div>
            <div class="number-field">
              <label for="questionCount"></label>
              <input id="questionCount" type="text" inputmode="numeric" pattern="[0-9]*" max="332" value="5">
            </div>
          </div>
        </section>

        <fieldset class="panel difficulty-panel">
          <legend></legend>
          <div class="difficulty-grid">
            <label class="choice-label">
              <input type="radio" name="difficulty" value="easy">
              <strong></strong>
            </label>
            <label class="choice-label">
              <input type="radio" name="difficulty" value="normal" checked>
              <strong></strong>
            </label>
            <label class="choice-label">
              <input type="radio" name="difficulty" value="hard">
              <strong></strong>
            </label>
            <label class="choice-label">
              <input type="radio" name="difficulty" value="very-hard">
              <strong></strong>
            </label>
          </div>
        </fieldset>
      </div>

      <div class="start-actions">
        <div class="pool-summary">
          <div class="pool-summary-head">
            <span class="pool-kicker"></span>
          </div>
          <div class="pool-series-list" id="poolSeriesList" aria-label=""></div>
          <div class="pool-meta-row">
            <strong id="poolTitle"></strong>
            <span id="poolMeta"></span>
          </div>
        </div>
        <button class="primary-button" id="startButton" type="button"></button>
      </div>
      <footer class="source-note" aria-label="">
        <span class="source-title" id="sourceNoteTitle"></span>
        <span class="source-group">
          <strong id="hexSourceLabel">HEX</strong>
          <a href="https://imas-db.jp/misc/color.html" target="_blank" rel="noopener">imas-db</a>
        </span>
        <span class="source-group source-group-images">
          <strong id="imageSourceLabel"></strong>
          <a href="https://imas.gamedbs.jp/mlth/" target="_blank" rel="noopener">765PRO ALLSTARS</a>
          <a href="https://imas.gamedbs.jp/mlth/" target="_blank" rel="noopener">Million Live</a>
          <a href="https://idolmaster-official.jp/cinderellagirls" target="_blank" rel="noopener">Cinderella Girls</a>
          <a href="https://shinycolors.idolmaster.jp/" target="_blank" rel="noopener">Shiny Colors</a>
          <a href="https://gakuen.idolmaster-official.jp/" target="_blank" rel="noopener">Gakuen</a>
          <a href="https://idolmaster-official.jp/sidem/" target="_blank" rel="noopener">SideM</a>
        </span>
      </footer>
    </section>

    <section class="screen" id="quizScreen" aria-live="polite">
      <div class="quiz-shell">
        <div class="quiz-nav">
          <button class="back-button" id="homeButton" type="button" aria-label=""></button>
        </div>
        <div class="quiz-progress">
          <div class="quiz-top">
            <div class="stat">
              <span></span>
              <strong id="progressText">1 / 5</strong>
            </div>
            <div class="stat">
              <span></span>
              <strong id="scoreText">0</strong>
            </div>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <div class="combo-badge" id="comboBadge" aria-live="polite" hidden></div>
        </div>

        <div class="stage">
          <div class="image-frame" id="imageFrame">
            <img id="characterImage" alt="" decoding="async" fetchpriority="high">
            <div class="image-fallback" id="imageFallback">
              <div class="fallback-name" id="fallbackName"></div>
            </div>
          </div>
          <div class="caption">
            <strong id="characterName"></strong>
            <span id="characterMeta"></span>
          </div>
          <div class="swatches" id="swatches"></div>
          <div class="answer-note" id="answerNote"></div>
          <button class="next-button" id="nextButton" type="button" hidden></button>
          <div class="feedback" id="feedback">
            <div class="feedback-mark" id="feedbackMark">O</div>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" id="resultScreen">
      <div class="result-layout">
        <div class="result-main">
          <div class="eyebrow"></div>
          <h2 id="resultMessage"></h2>
          <div class="score-number"><span id="scorePercent">0</span><span id="scoreUnit"></span></div>
          <p class="subtitle" id="scoreSummary"></p>
        </div>
        <div class="result-side">
          <h2 class="panel-title"></h2>
          <div class="result-stats">
            <div class="result-stat">
              <span></span>
              <strong id="resultCorrect">0</strong>
            </div>
            <div class="result-stat">
              <span></span>
              <strong id="resultTotal">0</strong>
            </div>
            <div class="result-stat">
              <span></span>
              <strong id="resultDifficulty">Normal</strong>
            </div>
            <div class="result-stat result-stat-series">
              <span></span>
              <div class="result-series-list" id="resultGroup" aria-label=""></div>
            </div>
          </div>
          <section class="wrong-note" id="wrongNoteSection" hidden>
            <div class="wrong-note-head">
              <h3 id="wrongNoteTitle"></h3>
              <button class="wrong-note-expand" id="wrongNoteExpandButton" type="button"></button>
            </div>
            <div class="wrong-note-list" id="wrongNoteList"></div>
          </section>
          <div class="result-actions">
            <button class="save-button" id="saveResultButton" type="button"></button>
            <button class="ghost-button" id="resetButton" type="button"></button>
          </div>
          <div class="result-preview" id="resultPreview" hidden>
            <span></span>
            <img id="resultPreviewImage" alt="">
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="wrong-note-modal" id="wrongNoteModal" role="dialog" aria-modal="true" aria-labelledby="wrongNoteModalTitle" hidden>
    <div class="wrong-note-backdrop" id="wrongNoteBackdrop"></div>
    <div class="wrong-note-modal-content" role="document">
      <div class="wrong-note-modal-head">
        <h2 id="wrongNoteModalTitle"></h2>
        <button class="wrong-note-close" id="wrongNoteCloseButton" type="button" aria-label="">×</button>
      </div>
      <div class="wrong-note-modal-list" id="wrongNoteModalList"></div>
    </div>
  </div>

  <!-- Series data files register themselves before data.js builds the combined quiz data. -->
  <script src="data/series/allstars.js?v=1.1"></script>
  <script src="data/series/million.js?v=1.1"></script>
  <script src="data/series/cinderella.js?v=1.3"></script>
  <script src="data/series/shiny.js?v=1.1"></script>
  <script src="data/series/gakuen.js?v=1.1"></script>
  <script src="data/series/sidem.js?v=1.1"></script>
  <script src="data.js?v=1.1"></script>
  <script src="lang.js?v=1.0"></script>
  <!-- script.js wires the UI events and game flow after the data is ready. -->
  <script src="script.js?v=1.4"></script>
</body>
</html>
